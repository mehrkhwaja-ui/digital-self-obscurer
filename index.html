<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIAS — be who you want to be</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f2;
            --surface: #e8e8e8;
            --border: #666666;
            --border-dim: #aaaaaa;
            --text: #222222;
            --text-dim: #666666;
            --text-bright: #000000;
            --pixel-mark: #888888;
            --radius: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DotGothic16', monospace;
            font-size: 16px;
            min-height: 100vh;
            padding: 40px 20px 60px;
            line-height: 1.8;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            text-align: left;
            padding: 32px 28px 24px;
            margin-bottom: 32px;
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: -12px;
            width: 20px;
            height: 20px;
            background:
                linear-gradient(var(--pixel-mark), var(--pixel-mark)) 0 0 / 10px 10px no-repeat,
                linear-gradient(var(--pixel-mark), var(--pixel-mark)) 10px 10px / 10px 10px no-repeat;
        }

        h1 {
            font-family: 'DotGothic16', monospace;
            font-size: clamp(24px, 5vw, 42px);
            color: var(--text-bright);
            letter-spacing: 6px;
            margin-bottom: 14px;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .box-header {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            padding: 12px 16px;
            color: var(--bg);
            background: var(--text-bright);
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        /* STATUS BAR */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-item {
            background: var(--surface);
            border: 2px solid var(--border-dim);
            padding: 14px;
            text-align: center;
            border-radius: var(--radius);
        }

        .stat-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: var(--text-dim);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 18px;
            color: var(--text-bright);
        }

        .pixel-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid var(--border-dim);
            margin-right: 6px;
            position: relative;
            background: #ccc;
            vertical-align: middle;
        }

        .pixel-indicator.active {
            background: var(--text-bright);
            border-color: var(--text-bright);
            animation: pulse-pixel 1s infinite;
        }

        @keyframes pulse-pixel {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* PERSONAS */
        .personas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .persona-card {
            border: 2px solid var(--border-dim);
            padding: 16px;
            cursor: pointer;
            background: var(--bg);
            transition: all 0.1s;
            position: relative;
            border-radius: var(--radius);
        }

        .persona-card:hover { border-color: var(--border); background: var(--surface); }
        .persona-card.selected { border-color: var(--text-bright); background: #dcdcdc; }
        .persona-card.selected::after {
            content: '▶ SELECTED';
            position: absolute;
            top: 8px; right: 10px;
            font-size: 7px;
            color: var(--text-bright);
            font-family: 'Press Start 2P', monospace;
        }

        .persona-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .persona-name {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--text-bright);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .persona-description {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* CONTROLS */
        .control-group {
            margin-bottom: 24px;
        }

        .control-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            letter-spacing: 1px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--border-dim);
            border: none;
            outline: none;
            -webkit-appearance: none;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--text-bright);
            cursor: pointer;
            border: 2px solid var(--border);
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--text-bright);
            cursor: pointer;
            border: 2px solid var(--border);
            border-radius: 2px;
        }

        .slider-value {
            min-width: 48px;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--text-bright);
            background: var(--surface);
            border: 2px solid var(--border-dim);
            padding: 6px;
            border-radius: 4px;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 14px;
            margin: 32px 0;
            justify-content: center;
        }

        .btn {
            font-family: 'DotGothic16', monospace;
            font-size: 16px;
            padding: 13px 48px;
            border: 2px solid;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.1s;
            border-radius: 4px;
        }

        .btn-start {
            background: var(--text-bright);
            border-color: var(--text-bright);
            color: var(--bg);
        }
        .btn-start:hover:not(:disabled) { background: var(--text); border-color: var(--text); color: var(--bg); }
        .btn-start:disabled { opacity: 0.2; cursor: not-allowed; }

        .btn-stop {
            background: transparent;
            border-color: var(--border);
            color: var(--text-dim);
        }
        .btn-stop:hover:not(:disabled) { border-color: var(--text-bright); color: var(--text-bright); }
        .btn-stop:disabled { opacity: 0.2; cursor: not-allowed; }

        /* SEARCH LOG */
        .search-log {
            background: var(--bg);
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 32px;
        }

        .search-log::-webkit-scrollbar { width: 6px; }
        .search-log::-webkit-scrollbar-track { background: var(--surface); }
        .search-log::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }

        .search-entry {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }
        .search-entry:last-child { border-bottom: none; }

        .search-query { color: var(--text); flex: 1; }
        .search-time { color: var(--text-dim); white-space: nowrap; font-size: 12px; }

        .log-empty {
            text-align: center;
            color: var(--text-dim);
            padding: 20px 0;
            font-size: 13px;
        }

        /* FOOTER */
        footer {
            text-align: left;
            padding: 18px 24px;
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-dim);
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 1px;
            background: var(--surface);
            border: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: var(--radius);
        }

        .blink { animation: blink 1.2s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 540px) {
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1>ALIAS</h1>
        <div class="tagline">be who you want to be.</div>
    </header>

    <!-- STEP 1 -->
    <div class="box-header">█ STEP 01 — SELECT A PERSONA █</div>
    <div class="personas-grid" id="personasGrid"></div>

    <!-- STEP 2 -->
    <div class="box-header">█ STEP 02 — CONFIGURE PARAMETERS █</div>
    <div class="control-group">
        <label class="control-label">▶ SEARCH FREQUENCY (PER HOUR)</label>
        <div class="slider-container">
            <input type="range" id="frequencySlider" min="1" max="12" value="4" step="1">
            <span class="slider-value" id="frequencyValue">04</span>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="button-group">
        <button class="btn btn-start" id="startBtn" disabled>▶ START</button>
        <button class="btn btn-stop" id="stopBtn" disabled>■ STOP</button>
    </div>

    <!-- ACTIVITY LOG -->
    <div class="box-header">█ ACTIVITY LOG █</div>
    <div class="search-log" id="searchLog">
        <p class="log-empty">[ NO ACTIVITY — SYSTEM IDLE ]</p>
    </div>

    <footer>
        <span>ALIAS v1.0</span>
        <span><span class="blink">■</span> SYSTEM IDLE</span>
    </footer>

</div>
<script>
    const personas = {
        ultrarunner: {
            name: "ULTRA RUNNER",
            icon: "🏃",
            description: "ENDURANCE ATHLETE • TRAIL OBSESSED • PAIN IS TEMPORARY",
            searches: [
                "ultra marathon training plan 100 miles","best trail running shoes 2024","how to prevent chafing long distance running","nutrition strategy for ultramarathon","Western States 100 lottery odds","recovery techniques after ultra marathon","best running watch for ultra distance","altitude training benefits runners","how to run downhill without injury","ultrarunning gear essentials","vert gain training workouts","aid station strategy ultra marathon","mental toughness ultrarunning","barefoot running vs cushioned shoes","electrolyte replacement during long runs","taper strategy before 100k race","ultrarunning podcasts best","trail running headlamp reviews","how to prevent blisters ultra running","cortney dauwalter training philosophy"
            ]
        },
        gorillaenthusiast: {
            name: "GORILLA ENTHUSIAST",
            icon: "🦍",
            description: "PRIMATE EXPERT • CONSERVATION ADVOCATE • APE APPRECIATION",
            searches: [
                "gorilla conservation efforts Africa","mountain gorilla population 2024","Dian Fossey research legacy","difference between gorilla species","silverback gorilla behavior patterns","gorilla habitat preservation projects","how to support gorilla conservation","gorilla communication and language","best documentaries about gorillas","Virunga National Park gorilla tours","gorilla diet in the wild","infant gorilla development stages","gorilla intelligence compared to humans","threats to gorilla populations","gorilla family structure dynamics","Koko the gorilla sign language","Rwanda gorilla trekking permits","lowland gorilla vs mountain gorilla","gorilla strength facts","adopt a gorilla charity programs"
            ]
        },
        superrepublican: {
            name: "SUPER REPUBLICAN",
            icon: "🇺🇸",
            description: "CONSERVATIVE VALUES • PATRIOT • TRADITIONAL PRINCIPLES",
            searches: [
                "conservative news sources unbiased","second amendment rights protection","traditional family values importance","free market capitalism benefits","border security policy solutions","reducing government spending strategies","school choice education reform","conservative talk radio podcasts","pro life movement organizations","energy independence domestic oil","tax cut economic growth","constitutional originalism explained","religious freedom protection laws","veteran support organizations","law and order police support","small business tax relief","conservative political candidates 2024","American exceptionalism history","deregulation economic benefits","national security priorities"
            ]
        },
        booknerd: {
            name: "BOOK NERD",
            icon: "📚",
            description: "LITERATURE LOVER • ALWAYS READING • LIBRARY REGULAR",
            searches: [
                "best contemporary literary fiction 2024","book club discussion questions","magical realism authors recommendations","independent bookstore near me","how to start a book club","penguin classics must read list","unreliable narrator books recommendations","book annotation methods colored tabs","debut novels 2024 highly anticipated","translated literature recommendations","bookshelf organization ideas aesthetic","reading journal prompts","best book subscription boxes","historical fiction world war 2","postmodern literature explained","how to read more books per year","literary magazines accepting submissions","banned books worth reading","short story collections underrated","book recommendations based on favorite authors"
            ]
        },
        homesteader: {
            name: "HOMESTEADER",
            icon: "🌿",
            description: "RURAL DREAMER • DIY EVERYTHING • SIMPLE LIVING ADVOCATE",
            searches: [
                "how to start a backyard garden for beginners","sourdough starter recipe no yeast","best chicken breeds for eggs","cottage aesthetic room decor ideas","how to preserve vegetables without canning","homesteading for beginners small space","knitting patterns free easy","mushroom foraging identification guide","how to make natural dye from plants","beekeeping starter kit essentials","vintage cottagecore clothing brands","herb garden indoor apartment","quilting patterns traditional","how to make cheese at home","off grid living solar panels","wildflower bouquet arrangements","embroidery stitches for beginners","composting toilet for tiny house","bread baking no knead recipe","rustic farmhouse kitchen design"
            ]
        },
        cryptobro: {
            name: "CRYPTO BRO",
            icon: "₿",
            description: "BLOCKCHAIN BELIEVER • DEFI DEGEN • DIAMOND HANDS ONLY",
            searches: [
                "bitcoin price prediction 2025","best crypto exchange low fees","how to stake ethereum for passive income","NFT marketplace opensea alternatives","solana vs ethereum transaction speed","crypto tax reporting software","defi yield farming strategies","hardware wallet ledger vs trezor","blockchain developer roadmap","upcoming crypto airdrops 2024","layer 2 scaling solutions ethereum","how to spot rug pull crypto","best crypto portfolio tracker app","tokenomics explained beginners","web3 job opportunities","metamask security best practices","altcoin season indicators","crypto technical analysis course","DAO governance participation","meme coin investing strategy"
            ]
        },
        lifecoach: {
            name: "LIFE COACH",
            icon: "🌅",
            description: "MORNING ROUTINE OPTIMISER • JOURNALING EVANGELIST • BEST SELF SEEKER",
            searches: [
                "5am morning routine successful people","cold plunge benefits science backed","how to journal for clarity and purpose","accountability partner app best 2024","atomic habits summary key takeaways","manifestation techniques that actually work","how to optimize your sleep for peak performance","best productivity system for creatives","gratitude practice morning ritual","vision board digital app","how to find your ikigai","stoicism for modern life beginners","dopamine detox protocol","breathwork techniques for anxiety","best self help books 2024 top rated","how to build discipline not motivation","mindset shifts for success","life coach certification online","why waking up early changes your life","how to become the best version of yourself"
            ]
        },
        dogparent: {
            name: "COMPETITIVE DOG PARENT",
            icon: "🐾",
            description: "DOG MOM/DAD • UNCONDITIONAL LOVE • MY DOG IS MY CHILD",
            searches: [
                "dog stroller for small breeds best 2024","canine nutritionist consultation online","dog birthday cake recipe grain free","can dogs sense mercury retrograde","best instagram accounts for shih tzus","is it normal to love your dog more than humans","dog anxiety weighted blanket reviews","organic dog food subscription box","dog friendly restaurants near me","how to throw a dog birthday party","dog DNA test most accurate","can dogs meditate with owners","dog massage therapy techniques","best dog therapist near me","puppy yoga class benefits","designer dog carrier bag fashionable","dog horoscope compatibility","how to make dog spa day at home","dog life coach certification","do dogs understand when you talk to them"
            ]
        }
    };

    let selectedPersona = null;
    let isRunning = false;
    let searchInterval = null;
    let searchCount = 0;
    let startTime = null;
    let timerInterval = null;
    let searchLog = [];

    const personasGrid = document.getElementById('personasGrid');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const searchLogEl = document.getElementById('searchLog');
    const frequencySlider = document.getElementById('frequencySlider');
    const frequencyValue = document.getElementById('frequencyValue');

    function initPersonas() {
        Object.keys(personas).forEach(key => {
            const persona = personas[key];
            const card = document.createElement('div');
            card.className = 'persona-card';
            card.dataset.persona = key;
            card.innerHTML = `
                <div class="persona-icon">${persona.icon}</div>
                <div class="persona-name">${persona.name}</div>
                <div class="persona-description">${persona.description}</div>
            `;
            card.addEventListener('click', () => selectPersona(key));
            personasGrid.appendChild(card);
        });
    }

    function selectPersona(personaKey) {
        selectedPersona = personaKey;
        document.querySelectorAll('.persona-card').forEach(card => card.classList.remove('selected'));
        document.querySelector(`[data-persona="${personaKey}"]`).classList.add('selected');
        startBtn.disabled = false;
    }

    frequencySlider.addEventListener('input', (e) => {
        frequencyValue.textContent = String(e.target.value).padStart(2, '0');
    });



    function performSearch() {
        if (!selectedPersona || !isRunning) return;
        const persona = personas[selectedPersona];
        const randomSearch = persona.searches[Math.floor(Math.random() * persona.searches.length)];
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(randomSearch)}`;
        const newTab = window.open(searchUrl, '_blank');
        const duration = 5000;
        setTimeout(() => { if (newTab) newTab.close(); }, duration);
        addToLog(randomSearch);
    }

    function addToLog(query) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString();
        searchLog.unshift({ query, time: timeStr });
        if (searchLog.length > 20) searchLog = searchLog.slice(0, 20);
        updateLogDisplay();
    }

    function updateLogDisplay() {
        if (searchLog.length === 0) {
            searchLogEl.innerHTML = '<p class="log-empty">[ NO ACTIVITY — SYSTEM IDLE ]</p>';
            return;
        }
        searchLogEl.innerHTML = searchLog.map(entry => `
            <div class="search-entry">
                <span class="search-query">► ${entry.query}</span>
                <span class="search-time">[${entry.time}]</span>
            </div>
        `).join('');
    }

    function updateTimer() {
        if (!startTime) return;
        const elapsed = Date.now() - startTime;
        const hours = Math.floor(elapsed / 3600000);
        const minutes = Math.floor((elapsed % 3600000) / 60000);
        const seconds = Math.floor((elapsed % 60000) / 1000);
        timeRunningEl.textContent =
            `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }

    startBtn.addEventListener('click', () => {
        if (!selectedPersona) return;
        isRunning = true;
        startTime = Date.now();
        document.querySelector('footer span:last-child').innerHTML = '<span class="blink">■</span> SYSTEM ACTIVE';
        startBtn.disabled = true;
        stopBtn.disabled = false;
        const searchesPerHour = parseInt(frequencySlider.value);
        const intervalMs = (60 * 60 * 1000) / searchesPerHour;
        performSearch();
        searchInterval = setInterval(performSearch, intervalMs);
    });

    stopBtn.addEventListener('click', () => {
        isRunning = false;
        if (searchInterval) { clearInterval(searchInterval); searchInterval = null; }
        document.querySelector('footer span:last-child').innerHTML = '<span class="blink">■</span> SYSTEM IDLE';
        startBtn.disabled = false;
        stopBtn.disabled = true;
    });

    initPersonas();

    window.addEventListener('beforeunload', (e) => {
        if (isRunning) {
            e.preventDefault();
            e.returnValue = '[WARNING] System is active. Exit anyway?';
            return e.returnValue;
        }
    });
</script>
</body>
</html>
